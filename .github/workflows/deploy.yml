name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build React
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: fastapi-shoppingcart-fixed/frontend
        run: npm install

      - name: Build
        working-directory: fastapi-shoppingcart-fixed/frontend
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          PUBLIC_URL: /fastapi-shoppingcart
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: fastapi-shoppingcart-fixed/frontend/build

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: fastapi-shoppingcart-fixed
        run: pip install -r requirements.txt

      - name: Check syntax
        working-directory: fastapi-shoppingcart-fixed
        run: python -m py_compile main.py database.py database_models.py models.py && echo "All files OK"
